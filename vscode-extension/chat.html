<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; background: #1e1e1e; color: #d4d4d4; height: 100vh; display: flex; flex-direction: column; }

#setup-banner { background: #0e639c; color: #fff; padding: 10px 16px; font-size: 13px; text-align: center; display: none; }
#setup-banner.visible { display: block; }
#setup-area { padding: 16px; border-bottom: 1px solid #333; background: #252526; display: none; gap: 8px; flex-direction: column; }
#setup-area.visible { display: flex; }
.setup-row { display: flex; gap: 8px; align-items: center; }
.setup-row label { min-width: 100px; font-size: 13px; color: #d4d4d4; }
#setup-area input, #setup-area select {
  flex: 1; background: #3c3c3c; color: #d4d4d4; border: 1px solid #555; border-radius: 6px;
  padding: 8px 12px; font-family: "Cascadia Code", Consolas, monospace; font-size: 13px; outline: none;
}
#setup-area input:focus, #setup-area select:focus { border-color: #0e639c; }
#setup-area button { background: #0e639c; color: #fff; border: none; border-radius: 6px; padding: 8px 20px; font-size: 13px; cursor: pointer; white-space: nowrap; }
#setup-area button:hover { background: #1177bb; }
#setup-area button:disabled { opacity: 0.5; cursor: default; }
#setup-hint { font-size: 11px; color: #888; padding: 0 16px 8px; display: none; }
#setup-hint.visible { display: block; }

#messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }

#loading { display: none; align-items: center; gap: 8px; padding: 6px 16px; color: #888; font-size: 12px; }
#loading.show { display: flex; }
#loading .spinner { width: 14px; height: 14px; border: 2px solid #444; border-top-color: #0e639c; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.msg { max-width: 85%; padding: 10px 14px; border-radius: 8px; line-height: 1.5; font-size: 13px; word-wrap: break-word; }
.msg.user { align-self: flex-end; background: #0e639c; color: #fff; }
.msg.assistant { align-self: flex-start; background: #2d2d2d; color: #d4d4d4; }
.msg .label { font-size: 11px; color: #888; margin-bottom: 4px; font-weight: 600; }
.msg.user .label { text-align: right; color: #7fc1ff; }
.msg.system { align-self: center; background: none; color: #888; font-size: 12px; font-style: italic; padding: 4px; }

.tool-call { align-self: flex-start; padding: 4px 16px; color: #888; font-size: 11px; font-style: italic; }
.tool-result { align-self: flex-start; padding: 2px 16px; color: #666; font-size: 11px; }
.tool-section { align-self: flex-start; width: 100%; margin: 4px 0; }
.tool-collapse-header { cursor: pointer; padding: 6px 12px; background: #2d2d2d; border-radius: 4px; font-size: 11px; color: #888; user-select: none; display: flex; align-items: center; gap: 6px; }
.tool-collapse-header:hover { background: #333; }
.tool-collapse-icon { font-size: 10px; transition: transform 0.2s; }
.tool-collapse-icon.expanded { transform: rotate(90deg); }
.tool-collapse-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; padding: 0 12px; }
.tool-collapse-content.expanded { max-height: 500px; overflow-y: auto; }

.assistant-content { white-space: pre-wrap; word-wrap: break-word; }
.assistant-content h1, .assistant-content h2, .assistant-content h3 { margin: 8px 0 4px; color: #569cd6; }
.assistant-content h1 { font-size: 16px; }
.assistant-content h2 { font-size: 15px; }
.assistant-content h3 { font-size: 14px; }
.assistant-content p { margin: 4px 0; }
.assistant-content ul, .assistant-content ol { margin: 4px 0; padding-left: 20px; }
.assistant-content code { background: #3c3c3c; padding: 1px 4px; border-radius: 3px; font-family: "Cascadia Code", "Fira Code", Consolas, monospace; font-size: 12px; }
.assistant-content pre { background: #1a1a1a; padding: 12px; border-radius: 6px; overflow-x: auto; margin: 8px 0; }
.assistant-content pre code { background: none; padding: 0; border-radius: 0; }
.assistant-content blockquote { border-left: 3px solid #569cd6; padding-left: 8px; margin: 4px 0; color: #888; }
.assistant-content a { color: #3794ff; }
.assistant-content strong { color: #e0e0e0; }

#settings-bar { display: flex; align-items: center; gap: 12px; padding: 8px 16px; border-top: 1px solid #333; background: #252526; font-size: 12px; }
.toggle-switch { position: relative; display: inline-block; width: 40px; height: 20px; }
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #555; transition: 0.3s; border-radius: 20px; }
.toggle-slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: 0.3s; border-radius: 50%; }
input:checked + .toggle-slider { background-color: #0e639c; }
input:checked + .toggle-slider:before { transform: translateX(20px); }
.settings-label { color: #d4d4d4; user-select: none; cursor: pointer; display: flex; align-items: center; gap: 8px; }

#input-area { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid #333; background: #252526; }
#input { flex: 1; background: #3c3c3c; color: #d4d4d4; border: 1px solid #555; border-radius: 6px; padding: 8px 12px; font-family: inherit; font-size: 13px; resize: none; outline: none; }
#input:focus { border-color: #0e639c; }
#send { background: #0e639c; color: #fff; border: none; border-radius: 6px; padding: 8px 20px; font-size: 13px; cursor: pointer; }
#send:hover { background: #1177bb; }
#send:disabled { opacity: 0.5; cursor: default; }
#error-banner { display: none; background: #5a1d1d; color: #f14c4c; padding: 8px 16px; font-size: 13px; }
</style>
</head>
<body>
<div id="setup-banner">Configuration Required — enter API settings below</div>
<div id="setup-area" style="display:flex;">
  <div class="setup-row">
    <label>API Base URL:</label>
    <input type="text" id="api-base-input" value="https://api.deepseek.com/anthropic" />
  </div>
  <div class="setup-row">
    <label>Model:</label>
    <input type="text" id="api-model-input" value="deepseek-v4-pro" placeholder="deepseek-v4-pro, deepseek-v4-flash, claude-opus-4..." />
  </div>
  <div class="setup-row">
    <label>API Key:</label>
    <input type="password" id="api-key-input" placeholder="sk-xxxxxxxxxxxxxxxx (DeepSeek API Key)" />
  </div>
  <div class="setup-row" style="justify-content: flex-end;">
    <button id="save-key-btn" onclick="saveApiKey()">Connect</button>
  </div>
</div>
<div id="setup-hint" style="display:block;">🚀 DeepSeek Anthropic API (https://api.deepseek.com/anthropic) · Claude model names auto-map: opus→v4-pro, sonnet/haiku→v4-flash · Get key: platform.deepseek.com</div>
<div id="messages"></div>
<div id="loading"><span class="spinner"></span> CodeYang is thinking...</div>
<div id="error-banner"></div>
<div id="settings-bar">
  <label class="settings-label">
    <span>🔧 折叠工具调用</span>
    <label class="toggle-switch">
      <input type="checkbox" id="collapse-tools-toggle" checked onchange="toggleToolCollapse()">
      <span class="toggle-slider"></span>
    </label>
  </label>
</div>
<div id="input-area">
  <textarea id="input" rows="2" placeholder="Ask CodeYang to help with code..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}"></textarea>
  <button id="send" onclick="send()">Send</button>
</div>
<div id="question-area" style="display:none; padding:8px 16px; border-top:1px solid #333; background:#252526; align-items:center; gap:8px;">
  <span id="question-text" style="flex:1; font-size:13px; color:#d4d4d4;"></span>
  <input id="question-input" style="flex:1; background:#3c3c3c; color:#d4d4d4; border:1px solid #555; border-radius:6px; padding:8px 12px; font-size:13px; outline:none; display:none;" placeholder="Your answer..." />
  <button id="question-send" onclick="sendAnswer()" style="background:#0e639c; color:#fff; border:none; border-radius:6px; padding:8px 16px; font-size:13px; cursor:pointer; display:none;">Answer</button>
</div>
<script>
var vscode = acquireVsCodeApi();
var messages = document.getElementById('messages');
var input = document.getElementById('input');
var sendBtn = document.getElementById('send');
var loading = document.getElementById('loading');
var errorBanner = document.getElementById('error-banner');
var setupArea = document.getElementById('setup-area');
var setupBanner = document.getElementById('setup-banner');
var setupHint = document.getElementById('setup-hint');
var apiKeyInput = document.getElementById('api-key-input');
var apiBaseInput = document.getElementById('api-base-input');
var apiModelInput = document.getElementById('api-model-input');
var assistantMsgDiv = null;
var hasApiKey = false;
var questionArea = document.getElementById('question-area');
var questionText = document.getElementById('question-text');
var questionInput = document.getElementById('question-input');
var questionSend = document.getElementById('question-send');
var questionOptions = [];
var inputArea = document.getElementById('input-area');
var currentToolSection = null;
var toolCallCount = 0;
var collapseToolsEnabled = true;

// Load collapse setting from localStorage
if (localStorage.getItem('collapseTools') !== null) {
  collapseToolsEnabled = localStorage.getItem('collapseTools') === 'true';
  document.getElementById('collapse-tools-toggle').checked = collapseToolsEnabled;
}

window.addEventListener('message', function(event) {
  var msg = event.data;
  switch (msg.type) {
    case 'apiKeySet':
      hasApiKey = true;
      setupArea.style.display = 'none';
      setupBanner.style.display = 'none';
      setupHint.style.display = 'none';
      addSystemMessage('Connected successfully. You can now start chatting!');
      input.focus();
      break;

    case 'showSetup':
      hasApiKey = false;
      setupArea.style.display = 'flex';
      setupBanner.style.display = 'block';
      setupHint.style.display = 'block';
      break;

    case 'addMessage':
      if (msg.role === 'assistant') {
        assistantMsgDiv = addAssistantMessage('');
      } else {
        addUserMessage(msg.content);
      }
      break;

    case 'append':
      if (assistantMsgDiv) {
        assistantMsgDiv.dataset.content += msg.content;
        var contentEl = assistantMsgDiv.querySelector('.assistant-content');
        if (contentEl) {
          contentEl.innerHTML = renderMarkdown(assistantMsgDiv.dataset.content);
        }
        scrollToBottom();
      }
      break;

    case 'toolCall':
      toolCallCount++;
      addToolIndicator(msg.name, msg.args);
      break;

    case 'toolResult':
      addToolResult(msg.output, msg.isError);
      break;

    case 'question':
      showQuestion(msg.question, msg.options || []);
      break;

    case 'done':
      loading.classList.remove('show');
      sendBtn.disabled = false;
      assistantMsgDiv = null;
      currentToolSection = null;
      toolCallCount = 0;
      input.focus();
      break;

    case 'error':
      loading.classList.remove('show');
      sendBtn.disabled = false;
      assistantMsgDiv = null;
      errorBanner.textContent = msg.message;
      errorBanner.style.display = 'block';
      setTimeout(function() { errorBanner.style.display = 'none'; }, 15000);
      break;
  }
});

function addUserMessage(text) {
  var div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = '<div class="label">You</div>' + escapeHtml(text);
  messages.appendChild(div);
  scrollToBottom();
}

function addAssistantMessage(content) {
  var div = document.createElement('div');
  div.className = 'msg assistant';
  div.dataset.content = content;
  div.innerHTML = '<div class="label">CodeYang</div><div class="assistant-content">' + renderMarkdown(content) + '</div>';
  messages.appendChild(div);
  scrollToBottom();
  return div;
}

function addSystemMessage(text) {
  var div = document.createElement('div');
  div.className = 'msg system';
  div.textContent = text;
  messages.appendChild(div);
  scrollToBottom();
}

function addToolIndicator(name, args) {
  // If collapse is disabled, show tools inline (old behavior)
  if (!collapseToolsEnabled) {
    var div = document.createElement('div');
    div.className = 'tool-call';
    div.textContent = name + '(' + args + ')';
    messages.appendChild(div);
    scrollToBottom();
    return;
  }

  // Create collapsible tool section if it doesn't exist
  if (!currentToolSection) {
    currentToolSection = document.createElement('div');
    currentToolSection.className = 'tool-section';

    var header = document.createElement('div');
    header.className = 'tool-collapse-header';
    header.innerHTML = '<span class="tool-collapse-icon">▶</span><span>🔧 工具调用 (0 个)</span>';
    header.onclick = function() { toggleToolSection(currentToolSection); };

    var content = document.createElement('div');
    content.className = 'tool-collapse-content';

    currentToolSection.appendChild(header);
    currentToolSection.appendChild(content);
    messages.appendChild(currentToolSection);
  }

  // Update header count
  var header = currentToolSection.querySelector('.tool-collapse-header span:last-child');
  header.textContent = '🔧 工具调用 (' + toolCallCount + ' 个)';

  // Add tool call to content
  var content = currentToolSection.querySelector('.tool-collapse-content');
  var div = document.createElement('div');
  div.className = 'tool-call';
  div.textContent = name + '(' + args + ')';
  content.appendChild(div);
  scrollToBottom();
}

function addToolResult(output, isError) {
  // If collapse is disabled, show results inline (old behavior)
  if (!collapseToolsEnabled) {
    var div = document.createElement('div');
    div.className = 'tool-result';
    div.textContent = (isError ? '! ' : '  ') + output;
    div.style.color = isError ? '#f14c4c' : '#666';
    messages.appendChild(div);
    scrollToBottom();
    return;
  }

  if (!currentToolSection) return;

  var content = currentToolSection.querySelector('.tool-collapse-content');
  var div = document.createElement('div');
  div.className = 'tool-result';
  div.textContent = (isError ? '! ' : '  ') + output;
  div.style.color = isError ? '#f14c4c' : '#666';
  content.appendChild(div);
  scrollToBottom();
}

function toggleToolSection(section) {
  var icon = section.querySelector('.tool-collapse-icon');
  var content = section.querySelector('.tool-collapse-content');

  if (content.classList.contains('expanded')) {
    content.classList.remove('expanded');
    icon.classList.remove('expanded');
  } else {
    content.classList.add('expanded');
    icon.classList.add('expanded');
  }
}

function saveApiKey() {
  var key = apiKeyInput.value.trim();
  var baseUrl = apiBaseInput.value.trim() || 'https://api.deepseek.com/anthropic';
  var model = apiModelInput.value.trim() || 'deepseek-v4-pro';
  if (!key) {
    addSystemMessage('Please enter your API key.');
    return;
  }
  apiKeyInput.value = '';
  vscode.postMessage({ type: 'setApiKey', key: key, baseUrl: baseUrl, model: model });
}

function send() {
  if (!hasApiKey) {
    addSystemMessage('Please enter your API key above first.');
    return;
  }
  var text = input.value.trim();
  if (!text || sendBtn.disabled) return;
  input.value = '';
  errorBanner.style.display = 'none';
  addUserMessage(text);
  loading.classList.add('show');
  sendBtn.disabled = true;
  vscode.postMessage({ type: 'chat', text: text });
}

function scrollToBottom() {
  messages.scrollTop = messages.scrollHeight;
}

function showQuestion(question, options) {
  questionOptions = options;
  questionText.textContent = question;
  questionArea.style.display = 'flex';
  inputArea.style.display = 'none';
  if (options && options.length > 0) {
    var optsText = options.map(function(o, i) { return (i+1) + '. ' + o.label; }).join('  ');
    questionText.textContent = question + ' [' + optsText + ']';
  }
  questionInput.style.display = 'flex';
  questionSend.style.display = 'block';
  questionInput.value = '';
  questionInput.focus();
}

function sendAnswer() {
  var answer = questionInput.value.trim();
  if (!answer) return;
  questionArea.style.display = 'none';
  questionInput.style.display = 'none';
  questionSend.style.display = 'none';
  inputArea.style.display = 'flex';
  input.focus();
  vscode.postMessage({ type: 'questionAnswer', answer: answer });
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleToolCollapse() {
  collapseToolsEnabled = document.getElementById('collapse-tools-toggle').checked;
  localStorage.setItem('collapseTools', collapseToolsEnabled);
  addSystemMessage(collapseToolsEnabled ? '✅ 工具调用折叠已启用' : '✅ 工具调用折叠已禁用');
}

function renderMarkdown(md) {
  md = md.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  md = md.replace(/```(\w*)\r?\n([\s\S]*?)```/g, function(_, lang, code) {
    return '<pre><code>' + code.trim() + '</code></pre>';
  });
  md = md.replace(/`([^`]+)`/g, '<code>$1</code>');
  md = md.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  md = md.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  md = md.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  md = md.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  md = md.replace(/^- (.+)$/gm, '<li>$1</li>');
  md = md.replace(/^(\d+)\. (.+)$/gm, '<li value="$1">$2</li>');
  md = md.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
  md = md.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  md = md.replace(/\*(.+?)\*/g, '<em>$1</em>');
  md = md.replace(/\n\n/g, '</p><p>');
  return '<p>' + md + '</p>';
}

vscode.postMessage({ type: 'ready' });
</script>
</body>
</html>
