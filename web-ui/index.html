<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeYang Web</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0d1117; color: #e6edf3; height: 100vh; display: flex; flex-direction: column;
  }
  header {
    padding: 12px 20px; background: #161b22; border-bottom: 1px solid #30363d;
    display: flex; align-items: center; gap: 12px;
  }
  header h1 { font-size: 16px; color: #58a6ff; }
  header span { color: #8b949e; font-size: 12px; }
  #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 85%; padding: 10px 14px; border-radius: 8px; line-height: 1.5; font-size: 14px; white-space: pre-wrap; }
  .user { background: #1f6feb; align-self: flex-end; }
  .agent { background: #21262d; align-self: flex-start; border: 1px solid #30363d; }
  .tool-call { background: #0d1117; border: 1px solid #30363d; align-self: flex-start; font-size: 12px; color: #8b949e; padding: 6px 10px; border-radius: 4px; }
  .streaming { border-left: 3px solid #58a6ff; }
  #input-bar {
    padding: 12px 20px; background: #161b22; border-top: 1px solid #30363d;
    display: flex; gap: 8px;
  }
  #input { flex: 1; padding: 10px 14px; border-radius: 6px; border: 1px solid #30363d;
    background: #0d1117; color: #e6edf3; font-size: 14px; outline: none; resize: none;
  }
  #input:focus { border-color: #58a6ff; }
  #send { padding: 10px 20px; border-radius: 6px; border: none; background: #238636;
    color: #fff; font-size: 14px; cursor: pointer; }
  #send:disabled { opacity: 0.5; cursor: not-allowed; }
  #send:hover:not(:disabled) { background: #2ea043; }
  .loading::after { content: '...'; animation: dots 1.5s infinite; }
  @keyframes dots { 0%,20% { content: '.'; } 40% { content: '..'; } 60%,100% { content: '...'; } }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #58a6ff; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status-bar { padding: 4px 20px; background: #161b22; border-top: 1px solid #30363d; font-size: 11px; color: #8b949e; display: flex; gap: 16px; }
  code { background: #30363d; padding: 1px 4px; border-radius: 3px; font-size: 13px; }
</style>
</head>
<body>
<header>
  <h1>CodeYang</h1>
  <span>v0.7.0</span>
  <span id="model-badge" style="margin-left:auto;font-size:12px;color:#8b949e;"></span>
</header>
<div id="chat"></div>
<div id="input-bar">
  <textarea id="input" rows="1" placeholder="输入消息..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
  <button id="send" onclick="send()">发送</button>
</div>
<div class="status-bar">
  <span id="status">就绪</span>
  <span id="token-count"></span>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const statusEl = document.getElementById('status');
const tokenEl = document.getElementById('token-count');
const modelBadge = document.getElementById('model-badge');
let loading = false;
let totalTokens = 0;

// Fetch config
fetch('/api/config').then(r => r.json()).then(cfg => {
  modelBadge.textContent = `${cfg.model} | ${cfg.provider}`;
});

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function addToolCall(name, args) {
  const div = document.createElement('div');
  div.className = 'tool-call';
  const argStr = Object.entries(args).map(([k,v]) => `${k}=${String(v).slice(0,60)}`).join(' ');
  div.textContent = `🔧 ${name}  ${argStr}`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const msg = input.value.trim();
  if (!msg || loading) return;
  input.value = '';
  input.style.height = 'auto';
  addMsg('user', msg);

  loading = true;
  sendBtn.disabled = true;
  statusEl.textContent = '思考中...';

  const agentMsg = addMsg('agent', '');
  agentMsg.classList.add('streaming');
  const spinner = document.createElement('span');
  spinner.className = 'spinner';
  agentMsg.prepend(spinner);

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let text = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value, { stream: true });
      for (const line of chunk.split('\n').filter(Boolean)) {
        if (!line.startsWith('data: ')) continue;
        const data = JSON.parse(line.slice(6));
        switch (data.type) {
          case 'delta':
            text += data.text;
            agentMsg.textContent = text;
            break;
          case 'tool_start':
            addToolCall(data.name, data.args);
            break;
          case 'tool_result':
            statusEl.textContent = `工具: ${data.name}`;
            break;
          case 'error':
            agentMsg.textContent += `\n\n❌ ${data.text}`;
            agentMsg.style.borderLeftColor = '#f85149';
            break;
          case 'done':
            agentMsg.classList.remove('streaming');
            break;
        }
        chat.scrollTop = chat.scrollHeight;
      }
    }
  } catch (err) {
    agentMsg.textContent += `\n\n❌ 连接错误: ${err.message}`;
    agentMsg.style.borderLeftColor = '#f85149';
  }

  spinner.remove();
  loading = false;
  sendBtn.disabled = false;
  statusEl.textContent = '就绪';
  input.focus();
}

// Auto-resize textarea
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 200) + 'px';
});
</script>
</body>
</html>
